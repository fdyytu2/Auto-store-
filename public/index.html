<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPOB Super Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); border-top: 4px solid #4CAF50; }
        h2 { text-align: center; color: #4CAF50; margin-top: 0; }
        p.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background-color: #2a2a2a; color: #fff; box-sizing: border-box; font-size: 16px; margin-bottom: 20px; }
        input[type="text"]:focus { outline: none; border-color: #4CAF50; }
        button { width: 100%; padding: 14px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #45a049; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; padding: 10px; border-radius: 6px; display: none; }
        .success { background-color: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 1px solid #4CAF50; }
        .error { background-color: rgba(244, 67, 54, 0.2); color: #f44336; border: 1px solid #f44336; }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚙️ Super Admin Panel</h2>
        <p class="subtitle">Pusat Kendali Bot PPOB Utama</p>
        
        <label for="botToken">Token Bot Utama:</label>
        <input type="text" id="botToken" placeholder="Paste Token Bot lu di sini...">
        
        <button onclick="simpanToken()">🚀 Simpan & Nyalakan Bot</button>
        
        <div id="status"></div>
    </div>

    <script>
        // Cek apakah token udah ada di database pas web dibuka
        window.onload = async () => {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                if(data.botToken) document.getElementById('botToken').value = data.botToken;
            } catch (e) { console.log('Gagal ambil data awal'); }
        };

        async function simpanToken() {
            const token = document.getElementById('botToken').value;
            const statusDiv = document.getElementById('status');
            
            if (!token) {
                tampilStatus("❌ Token nggak boleh kosong bro!", "error");
                return;
            }

            tampilStatus("⏳ Menyimpan ke Database PostgreSQL...", "");
            
            try {
                const res = await fetch('/api/update-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ botToken: token })
                });
                
                const result = await res.json();
                
                if (result.success) {
                    tampilStatus(result.message, "success");
                    // Opsi tambahan: Lu bisa tambahin notif ke Discord lu dari server.js nanti
                } else {
                    tampilStatus("❌ Gagal: " + result.error, "error");
                }
            } catch (err) {
                tampilStatus("❌ Server error atau koneksi terputus.", "error");
            }
        }

        function tampilStatus(pesan, tipe) {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.className = tipe;
            statusDiv.innerHTML = pesan;
        }
    </script>
</body>
</html>
