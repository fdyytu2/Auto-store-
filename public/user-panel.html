<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Penyewa PPOB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0f172a; --bg-card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6; --primary-hover: #2563eb;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); padding: 20px 15px; margin: 0; background-image: radial-gradient(circle at 50% -20%, #1e3a8a, var(--bg-main)); background-attachment: fixed; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 15px 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 4px 30px rgba(0,0,0,0.3); }
        .profile { display: flex; align-items: center; gap: 15px; }
        .profile img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; }
        .profile-info h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .profile-info p { margin: 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .tier-badge { background: rgba(245, 158, 11, 0.2); color: var(--warning); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid rgba(245, 158, 11, 0.3); }
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; text-decoration: none; cursor: pointer; transition: all 0.3s ease; border: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-logout { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-save { background: linear-gradient(135deg, var(--primary), #60a5fa); color: white; width: 100%; justify-content: center; padding: 14px; margin-top: 10px; }
        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--bg-card); backdrop-filter: blur(12px); padding: 25px; border-radius: 16px; border: 1px solid var(--border); }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .card-header h2 { margin: 0; font-size: 18px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight: 500; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; font-size: 14px; font-family: monospace; }
        input:disabled { background: rgba(255,255,255,0.05); color: #64748b; cursor: not-allowed; }
        .locked-msg { font-size: 12px; color: var(--danger); margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="profile">
            <img id="user-avatar" src="https://cdn-icons-png.flaticon.com/512/847/847969.png">
            <div class="profile-info">
                <h3 id="user-name">Memuat...</h3>
                <p>Paket: <span id="user-tier" class="tier-badge">Loading...</span></p>
            </div>
        </div>
        <a href="/api/auth/logout" class="btn btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header"><i class="fas fa-box-open" style="color:var(--success);"></i><h2>Pengaturan Live Stock</h2></div>
            <div class="input-group">
                <label>ID Channel Discord (Tempat bot ngirim info stock)</label>
                <input type="text" id="liveStockChannel" placeholder="Contoh: 1035189920488235120">
            </div>
            <button onclick="simpanPengaturan('stock')" class="btn btn-save"><i class="fas fa-save"></i> Simpan Channel Stock</button>
        </div>

        <div class="card">
            <div class="card-header"><i class="fas fa-brain" style="color:#a855f7;"></i><h2>AI Assistant (Gemini)</h2></div>
            <p style="font-size:13px; color:var(--text-muted); margin-bottom:15px;">Dapatkan API Key gratis di Google AI Studio. Wajib diisi untuk pengguna paket Basic.</p>
            <div class="input-group">
                <label>Gemini API Key Milikmu</label>
                <input type="password" id="geminiApiKey" placeholder="AIzaSyA...">
            </div>
            <button onclick="simpanPengaturan('ai')" class="btn btn-save" style="background: linear-gradient(135deg, #a855f7, #c084fc);"><i class="fas fa-save"></i> Simpan Kunci AI</button>
        </div>

        <div class="card" id="card-ultra">
            <div class="card-header"><i class="fas fa-robot" style="color:var(--warning);"></i><h2>Custom Bot (Khusus Ultra)</h2></div>
            <div class="input-group">
                <label>Token Bot Discord Milikmu</label>
                <input type="password" id="customBotToken" placeholder="MTE...">
                <div id="lock-msg" class="locked-msg"><i class="fas fa-lock"></i> Fitur ini hanya untuk pengguna paket ULTRA.</div>
            </div>
            <button id="btn-save-bot" onclick="simpanPengaturan('bot')" class="btn btn-save" style="background: linear-gradient(135deg, var(--warning), #fbbf24);"><i class="fas fa-rocket"></i> Simpan & Nyalakan Bot</button>
        </div>
    </div>

    <script>
        // Nanti kita isi logika fetch data dari backend di sini
        // Biar user tau apa yang udah mereka simpan
    </script>
</body>
</html>
<script>
window.addEventListener("error", function(e) {
    fetch("/api/log-frontend", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: e.message, url: window.location.pathname }) });
});
window.addEventListener("unhandledrejection", function(e) {
    fetch("/api/log-frontend", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: "Gagal ambil API (Promise Rejection): " + String(e.reason), url: window.location.pathname }) });
});
</script>
