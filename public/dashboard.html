<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; margin: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #1e1e1e; padding: 15px 20px; border-radius: 8px; margin-bottom: 30px; border-bottom: 2px solid #5865F2; }
        .profile { display: flex; align-items: center; gap: 15px; }
        .profile img { width: 40px; height: 40px; border-radius: 50%; }
        .logout-btn { background-color: #f44336; color: white; padding: 8px 15px; text-decoration: none; border-radius: 6px; font-weight: bold; }
        .container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background-color: #1e1e1e; padding: 25px; border-radius: 12px; border-top: 4px solid #4CAF50; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background-color: #2a2a2a; color: #fff; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Gaya Tabel Penyewa */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #2a2a2a; color: #ccc; }
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .bg-active { background-color: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .bg-inactive { background-color: rgba(244, 67, 54, 0.2); color: #f44336; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="profile">
            <img id="user-avatar" src="" alt="Avatar">
            <div>
                <h3 id="user-name" style="margin:0;">Loading...</h3>
                <p id="user-role" style="margin:0; font-size:12px; color:#aaa;">Role: -</p>
            </div>
        </div>
        <a href="/api/auth/logout" class="logout-btn">Logout</a>
    </div>

    <div class="container">
        <div class="card">
            <h2>⚙️ Bot Utama (Sistem Pusat)</h2>
            <input type="text" id="botToken" placeholder="Token Bot Utama...">
            <button onclick="simpanToken()">🚀 Update Token Pusat</button>
            <p id="status" style="margin-top: 10px; text-align: center; display: none;"></p>
        </div>

        <div class="card" style="border-top-color: #5865F2;">
            <h2>👥 Manajemen Bot Penyewa</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID Discord Penyewa</th>
                        <th>Prefix</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tenant-list">
                    <tr><td colspan="4" style="text-align: center; color: #888;">Memuat data penyewa...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        window.onload = async () => {
            // Cek Auth
            const authRes = await fetch('/api/auth/me');
            const authData = await authRes.json();
            if (!authData.loggedIn) return window.location.href = '/login.html';

            document.getElementById('user-name').innerText = authData.user.username;
            document.getElementById('user-role').innerText = 'Role: ' + authData.user.role;
            if(authData.user.avatar) document.getElementById('user-avatar').src = authData.user.avatar;

            // Load Token Utama
            const setRes = await fetch('/api/settings');
            const setData = await setRes.json();
            if(setData.botToken) document.getElementById('botToken').value = setData.botToken;

            // Load Tabel Penyewa
            loadTenants();
        };

        async function loadTenants() {
            try {
                const res = await fetch('/api/admin/bots');
                const result = await res.json();
                const tbody = document.getElementById('tenant-list');
                
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #888;">Belum ada penyewa bot.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                result.data.forEach(bot => {
                    const statusClass = bot.status === 'active' ? 'bg-active' : 'bg-inactive';
                    tbody.innerHTML += `
                        <tr>
                            <td>${bot.ownerId}</td>
                            <td>${bot.prefix}</td>
                            <td><span class="badge ${statusClass}">${bot.status.toUpperCase()}</span></td>
                            <td><button style="width:auto; padding:6px 12px; font-size:12px; background-color:#f44336;">Matikan</button></td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error("Gagal load data penyewa");
            }
        }

        async function simpanToken() {
            const token = document.getElementById('botToken').value;
            // (Kode simpanToken sama seperti sebelumnya)
        }
    </script>
</body>
</html>
