<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0f172a; --bg-card: rgba(30, 41, 59, 0.7);
            --primary: #6366f1; --success: #10b981; --danger: #ef4444;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); padding: 20px 15px; margin: 0; background-image: radial-gradient(circle at 50% -20%, #1e1b4b, var(--bg-main)); background-attachment: fixed; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 15px 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid var(--border); backdrop-filter: blur(12px); }
        .profile { display: flex; align-items: center; gap: 15px; }
        .profile img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }
        .profile-info h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .profile-info p { margin: 0; font-size: 13px; color: var(--text-muted); }
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-logout { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); text-decoration: none; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #8b5cf6); color: white; width: 100%; justify-content: center; padding: 14px; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(12px); }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; font-family: monospace; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .badge { padding: 6px 12px; border-radius: 99px; font-size: 12px; font-weight: bold; }
        .bg-active { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .bg-inactive { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        #status { margin-top: 15px; text-align: center; padding: 12px; border-radius: 8px; display: none; font-weight: 500; }
        .status-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="profile">
            <img id="user-avatar" src="https://cdn-icons-png.flaticon.com/512/847/847969.png">
            <div class="profile-info">
                <h3 id="user-name">Memuat...</h3>
                <p id="user-role"><i class="fas fa-shield-alt"></i> Role: -</p>
            </div>
        </div>
        <a href="/api/auth/logout" class="btn btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-robot" style="color: var(--primary); font-size: 20px;"></i><h2 style="margin:0;">Mesin Bot Pusat</h2>
            </div>
            <div class="input-group">
                <label>Token API Bot Utama</label>
                <input type="text" id="botToken" placeholder="Paste Token Bot lu di sini...">
            </div>
            <div class="input-group">
                <label>Status Bot (Playing...)</label>
                <input type="text" id="botActivity" placeholder="Contoh: Jualan PPOB Termurah">
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="kontrolBot('start')" class="btn" style="background: var(--success); color: white; flex: 1;"><i class="fas fa-play"></i> Start Bot</button>
                <button onclick="kontrolBot('stop')" class="btn" style="background: var(--danger); color: white; flex: 1;"><i class="fas fa-stop"></i> Stop Bot</button>
            </div>
            <button onclick="kontrolBot('activity')" class="btn btn-primary"><i class="fas fa-gamepad"></i> Update Status Playing</button>
            <div id="status"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="fas fa-users-cog" style="color: var(--primary); font-size: 20px;"></i><h2 style="margin:0;">Manajemen Penyewa (Tenant)</h2>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>ID Discord Tenant</th><th>Prefix</th><th>Status Node</th><th>Tindakan</th></tr>
                    </thead>
                    <tbody id="tenant-list">
                        <tr><td colspan="4" style="text-align:center; padding: 20px; color: var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Memuat data server...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        window.onload = async () => {
            try {
                // 1. Ambil Profil Lu
                const authRes = await fetch('/api/user/me');
                if (!authRes.ok) return window.location.href = '/login.html';
                const authData = await authRes.json();
                
                if (!authData.success) return window.location.href = '/login.html';

                document.getElementById('user-name').innerText = authData.user.username;
                document.getElementById('user-role').innerHTML = `<i class="fas fa-shield-alt"></i> Role: ${authData.user.role.toUpperCase()}`;
                
                // 2. Ambil Settingan Token
                const setRes = await fetch('/api/admin/settings');
                const setData = await setRes.json();
                if(setData.botToken) document.getElementById('botToken').value = setData.botToken;

                // 3. Load Daftar Penyewa
                loadTenants();
            } catch (e) {
                console.error('Error init:', e);
                document.getElementById('user-name').innerText = "Gagal memuat profil";
            }
        };

        async function loadTenants() {
            try {
                const res = await fetch('/api/admin/bots');
                const result = await res.json();
                const tbody = document.getElementById('tenant-list');
                
                if (!result.data || result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px; color: var(--text-muted);"><i class="fas fa-inbox"></i> Belum ada penyewa bot yang aktif.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                result.data.forEach(bot => {
                    const statusClass = bot.status === 'active' ? 'bg-active' : 'bg-inactive';
                    tbody.innerHTML += `
                        <tr>
                            <td><i class="fab fa-discord" style="color:#5865F2;"></i> ${bot.ownerId}</td>
                            <td><code style="background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:4px;">${bot.prefix}</code></td>
                            <td><span class="badge ${statusClass}"><i class="fas fa-circle" style="font-size:8px; margin-right:4px;"></i>${bot.status.toUpperCase()}</span></td>
                            <td><button class="btn btn-logout" style="padding:6px 12px;"><i class="fas fa-power-off"></i></button></td>
                        </tr>
                    `;
                });
            } catch (e) {
                document.getElementById('tenant-list').innerHTML = '<tr><td colspan="4" style="color:var(--danger);text-align:center; padding: 20px;">Gagal memuat data penyewa.</td></tr>';
            }
        }

        async function kontrolBot(action) {
            const token = document.getElementById('botToken').value;
            const activity = document.getElementById('botActivity').value;
            
            if (action === 'start' && !token) return tampilStatus("❌ Token API tidak boleh kosong!", "error");
            tampilStatus("<i class='fas fa-spinner fa-spin'></i> Memproses instruksi ke server...", "");
            
            try {
                const res = await fetch('/api/admin/control-main-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, token, activity })
                });
                const result = await res.json();
                
                if (result.success) {
                    tampilStatus("<i class='fas fa-check-circle'></i> " + result.message, "success");
                } else {
                    tampilStatus("<i class='fas fa-exclamation-triangle'></i> Gagal: " + result.error, "error");
                }
            } catch (err) {
                tampilStatus("<i class='fas fa-wifi'></i> Server terputus.", "error");
            }
        }

        function tampilStatus(pesan, tipe) {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.className = tipe === 'success' ? 'status-success' : 'status-error';
            statusDiv.innerHTML = pesan;
        }
    </script>
</body>
</html>
