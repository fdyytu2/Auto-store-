<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); padding: 20px 15px; margin: 0; background-image: radial-gradient(circle at 50% -20%, #1e1b4b, var(--bg-main)); background-attachment: fixed; }
        
        /* Navbar Glassmorphism */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 15px 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 4px 30px rgba(0,0,0,0.3); }
        .profile { display: flex; align-items: center; gap: 15px; }
        .profile img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; }
        .profile-info h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .profile-info p { margin: 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        
        /* Button Styles */
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; text-decoration: none; cursor: pointer; transition: all 0.3s ease; border: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-logout { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-logout:hover { background: var(--danger); color: white; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #8b5cf6); color: white; width: 100%; justify-content: center; padding: 14px; font-size: 15px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6); }

        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* Card Styles */
        .card { background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 25px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .card-header h2 { margin: 0; font-size: 18px; font-weight: 600; }
        .card-header i { color: var(--primary); font-size: 20px; }
        
        /* Inputs */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); font-weight: 500; }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; font-size: 15px; transition: 0.3s; font-family: monospace; }
        input[type="text"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        
        /* Table Styles */
        .table-responsive { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(0,0,0,0.3); color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        /* Badges */
        .badge { padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
        .bg-active { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .bg-inactive { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        
        .empty-state { text-align: center; padding: 30px; color: var(--text-muted); }
        #status { margin-top: 15px; text-align: center; font-weight: 500; padding: 12px; border-radius: 8px; display: none; font-size: 14px; }
        .status-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="profile">
            <img id="user-avatar" src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Avatar">
            <div class="profile-info">
                <h3 id="user-name">Memuat...</h3>
                <p id="user-role"><i class="fas fa-shield-alt"></i> Role: -</p>
            </div>
        </div>
        <a href="/api/auth/logout" class="btn btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-robot"></i>
                <h2>Mesin Bot Pusat</h2>
            </div>
            <div class="input-group">
                <label for="botToken">Token API Bot Utama</label>
                <input type="text" id="botToken" placeholder="Paste Token Bot lu di sini...">
            </div>
            <button onclick="simpanToken()" class="btn btn-primary"><i class="fas fa-rocket"></i> Sinkronisasi & Nyalakan Bot</button>
            <div id="status"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="fas fa-users-cog"></i>
                <h2>Manajemen Penyewa (Tenant)</h2>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID Discord Tenant</th>
                            <th>Prefix</th>
                            <th>Status Node</th>
                            <th>Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="tenant-list">
                        <tr><td colspan="4" class="empty-state"><i class="fas fa-spinner fa-spin"></i> Memuat data server...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    window.onload = async () => {
        try {
            // 1. Ambil data profil bos
            const authRes = await fetch('/api/user/me');
            if (!authRes.ok) return window.location.href = '/login.html';
            const authData = await authRes.json();
            
            if (!authData.success) return window.location.href = '/login.html';

            document.getElementById('user-name').innerText = authData.user.username;
            document.getElementById('user-role').innerHTML = `<i class="fas fa-shield-alt"></i> Role: ${authData.user.role}`;
            
            // 2. Ambil token bot kalau udah pernah disimpen
            const setRes = await fetch('/api/admin/settings');
            const setData = await setRes.json();
            if(setData.botToken) document.getElementById('botToken').value = setData.botToken;

            // 3. Load data penyewa
            loadTenants();
        } catch (e) {
            console.error('Error inisialisasi', e);
            document.getElementById('user-name').innerText = "Gagal memuat profil";
        }
    };

    async function loadTenants() {
        try {
            const res = await fetch('/api/admin/bots');
            const result = await res.json();
            const tbody = document.getElementById('tenant-list');
            
            if (result.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state"><i class="fas fa-inbox"></i> Belum ada penyewa bot yang aktif.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            result.data.forEach(bot => {
                const statusClass = bot.status === 'active' ? 'bg-active' : 'bg-inactive';
                tbody.innerHTML += `
                    <tr>
                        <td><i class="fab fa-discord" style="color:#5865F2;"></i> ${bot.ownerId}</td>
                        <td><code style="background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px;">${bot.prefix}</code></td>
                        <td><span class="badge ${statusClass}"><i class="fas fa-circle" style="font-size:8px; margin-right:4px;"></i>${bot.status.toUpperCase()}</span></td>
                        <td><button class="btn btn-logout" style="padding:6px 12px; font-size:12px;"><i class="fas fa-power-off"></i></button></td>
                    </tr>
                `;
            });
        } catch (e) {
            document.getElementById('tenant-list').innerHTML = '<tr><td colspan="4" class="empty-state status-error">Gagal memuat data penyewa.</td></tr>';
        }
    }

    async function simpanToken() {
        const token = document.getElementById('botToken').value;
        const statusDiv = document.getElementById('status');
        
        if (!token) return tampilStatus("❌ Token API tidak boleh kosong!", "error");
        tampilStatus("<i class='fas fa-spinner fa-spin'></i> Menyimpan ke Database...", "");
        
        try {
            const res = await fetch('/api/admin/update-main-bot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            });
            const result = await res.json();
            if (result.success) tampilStatus("<i class='fas fa-check-circle'></i> " + result.message, "success");
            else tampilStatus("<i class='fas fa-exclamation-triangle'></i> Gagal: " + result.error, "error");
        } catch (err) {
            tampilStatus("<i class='fas fa-wifi'></i> Server terputus.", "error");
        }
    }

    function tampilStatus(pesan, tipe) {
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = 'block';
        statusDiv.className = tipe === 'success' ? 'status-success' : 'status-error';
        statusDiv.innerHTML = pesan;
    }
</script>

<script>
window.addEventListener("error", function(e) {
    fetch("/api/log-frontend", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: e.message, url: window.location.pathname }) });
});
window.addEventListener("unhandledrejection", function(e) {
    fetch("/api/log-frontend", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: "Gagal ambil API (Promise Rejection): " + String(e.reason), url: window.location.pathname }) });
});
</script>
