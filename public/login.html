<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PPOB Auto Store</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f0f; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #1a1a1a; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); text-align: center; width: 100%; max-width: 350px; border-top: 4px solid #5865F2; }
        h2 { margin-top: 0; color: #5865F2; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }
        .discord-btn { display: inline-block; width: 100%; padding: 12px 0; background-color: #5865F2; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        .discord-btn:hover { background-color: #4752C4; }
        #error-msg { color: #ff4a4a; margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔒 PPOB Auto Store</h2>
        <p>Sistem Manajemen Multi-Tenant Bot</p>
        
        <a href="/api/auth/login" class="discord-btn">Masuk dengan Discord</a>
        
        <div id="error-msg"></div>
    </div>

    <script>
        // Tangkep pesan error dari URL kalau batal login
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.style.display = 'block';
            if (error === 'batal_login') errorDiv.innerText = '❌ Lu ngebatalin login bro.';
            else if (error === 'server_error') errorDiv.innerText = '❌ Server lagi gangguan.';
            else errorDiv.innerText = '❌ Gagal login: ' + error;
        }
    </script>
</body>
</html>
